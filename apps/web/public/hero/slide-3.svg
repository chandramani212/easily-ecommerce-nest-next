<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none" role="img" aria-label="Fast free delivery of promotional products">
  <defs>
    <linearGradient id="s3sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <ellipse cx="600" cy="985" rx="450" ry="72" fill="#0f172a" opacity="0.20"/>

  <!-- ===== Delivery truck ===== -->
  <g transform="translate(600 640)">
    <!-- cargo body -->
    <rect x="-330" y="-70" width="360" height="250" rx="20" fill="#F1F5F9"/>
    <rect x="-330" y="-70" width="360" height="60" rx="20" fill="#E2E8F0"/>
    <rect x="-330" y="-70" width="360" height="250" rx="20" fill="url(#s3sheen)" opacity="0.5"/>
    <!-- brand emblem on side -->
    <circle cx="-150" cy="55" r="58" fill="#2DD4BF"/>
    <path d="M-150 20 l16 40 l-40 -26 h48 l-40 26 z" fill="#ffffff"/>
    <!-- cab -->
    <path d="M30 -30 h120 l70 90 v120 h-190 z" fill="#14B8A6"/>
    <path d="M30 -30 h120 l70 90 v20 h-190 z" fill="#0F9488"/>
    <rect x="60" y="10" width="120" height="70" rx="10" fill="#BAE6FD"/>
    <rect x="60" y="10" width="120" height="70" rx="10" fill="url(#s3sheen)" opacity="0.6"/>
    <!-- wheels -->
    <circle cx="-210" cy="185" r="58" fill="#1E293B"/>
    <circle cx="-210" cy="185" r="26" fill="#64748B"/>
    <circle cx="120" cy="185" r="58" fill="#1E293B"/>
    <circle cx="120" cy="185" r="26" fill="#64748B"/>
    <!-- motion lines -->
    <path d="M-380 -20 h70 M-410 40 h90 M-380 100 h70" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- ===== Open shipping box spilling products, front ===== -->
  <g transform="translate(430 860)">
    <!-- box -->
    <path d="M-150 -40 l150 -46 l150 46 v130 l-150 46 l-150 -46 z" fill="#D6A867"/>
    <path d="M-150 -40 l150 46 v130 l-150 -46 z" fill="#B98A4D"/>
    <path d="M0 6 l150 -46 v130 l-150 46 z" fill="#C79A5B"/>
    <!-- open flaps -->
    <path d="M-150 -40 l150 -46 l-70 -30 l-150 46 z" fill="#E7BE84"/>
    <path d="M150 -40 l-150 -46 l70 -30 l150 46 z" fill="#E7BE84"/>
    <path d="M-4 -30 v70" stroke="#8B6534" stroke-width="4" opacity="0.5"/>
    <!-- product poking out: mug -->
    <g transform="translate(-30 -70)">
      <path d="M-46 -50 h92 v46 a46 26 0 0 1 -92 0 z" fill="#FF6B6B"/>
      <ellipse cx="0" cy="-50" rx="46" ry="16" fill="#FF8787"/>
      <path d="M46 -34 a26 26 0 0 1 0 54" fill="none" stroke="#FF6B6B" stroke-width="14" stroke-linecap="round"/>
    </g>
    <!-- product poking out: bottle -->
    <g transform="translate(60 -96)">
      <rect x="-26" y="-40" width="52" height="150" rx="20" fill="#7C3AED"/>
      <rect x="-30" y="-62" width="60" height="28" rx="10" fill="#334155"/>
      <rect x="-26" y="-40" width="14" height="150" rx="7" fill="#ffffff" opacity="0.25"/>
    </g>
  </g>

  <!-- ===== Location pin / fast badge top-right ===== -->
  <g transform="translate(930 360)">
    <path d="M0 -110 a95 95 0 0 1 95 95 c0 70 -95 175 -95 175 s-95 -105 -95 -175 a95 95 0 0 1 95 -95 z" fill="#EF4444"/>
    <path d="M0 -110 a95 95 0 0 1 40 10 c-40 20 -70 60 -70 110 c0 55 60 130 70 145 c-5 5 -10 10 -10 10 s-95 -105 -95 -175 a95 95 0 0 1 65 -100 z" fill="#DC2626"/>
    <circle cx="0" cy="-15" r="46" fill="#ffffff"/>
    <path d="M-22 -15 l16 18 l32 -36" stroke="#EF4444" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
