<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none" role="img" aria-label="Bulk promotional products with discount">
  <defs>
    <linearGradient id="s2sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <ellipse cx="600" cy="980" rx="440" ry="70" fill="#0f172a" opacity="0.20"/>

  <!-- ===== Stack of mugs (bulk) center ===== -->
  <g transform="translate(560 660)">
    <!-- bottom mug -->
    <g transform="translate(0 190)">
      <path d="M-95 -70 h190 v70 a95 40 0 0 1 -190 0 z" fill="#F6A609"/>
      <ellipse cx="0" cy="-70" rx="95" ry="30" fill="#FFC93C"/>
      <ellipse cx="0" cy="-70" rx="72" ry="20" fill="#B4700A"/>
      <path d="M95 -50 a44 44 0 0 1 0 90" fill="none" stroke="#F6A609" stroke-width="22" stroke-linecap="round"/>
    </g>
    <!-- middle mug -->
    <g transform="translate(-6 40)">
      <path d="M-95 -70 h190 v70 a95 40 0 0 1 -190 0 z" fill="#2DD4BF"/>
      <ellipse cx="0" cy="-70" rx="95" ry="30" fill="#5EEAD4"/>
      <ellipse cx="0" cy="-70" rx="72" ry="20" fill="#0F9488"/>
      <path d="M95 -50 a44 44 0 0 1 0 90" fill="none" stroke="#2DD4BF" stroke-width="22" stroke-linecap="round"/>
    </g>
    <!-- top mug (with badge) -->
    <g transform="translate(4 -110)">
      <path d="M-95 -70 h190 v70 a95 40 0 0 1 -190 0 z" fill="#FF6B6B"/>
      <ellipse cx="0" cy="-70" rx="95" ry="30" fill="#FF8787"/>
      <ellipse cx="0" cy="-70" rx="72" ry="20" fill="#B33B3B"/>
      <path d="M95 -50 a44 44 0 0 1 0 90" fill="none" stroke="#FF6B6B" stroke-width="22" stroke-linecap="round"/>
      <rect x="-52" y="-40" width="104" height="66" rx="12" fill="#ffffff" opacity="0.95"/>
      <path d="M0 -24 l14 34 l-34 -22 h42 l-34 22 z" fill="#FF6B6B"/>
    </g>
    <path d="M-95 120 h30 v70 a95 40 0 0 0 30 30 z" fill="url(#s2sheen)" opacity="0.4"/>
  </g>

  <!-- ===== Fan of pens (bulk) left ===== -->
  <g transform="translate(330 720)">
    <g transform="rotate(-24)"><rect x="-16" y="-150" width="32" height="300" rx="16" fill="#7C3AED"/><rect x="-18" y="-166" width="36" height="26" rx="8" fill="#A78BFA"/><path d="M-16 150 l16 40 l16 -40z" fill="#334155"/></g>
    <g transform="rotate(-8)"><rect x="-16" y="-150" width="32" height="300" rx="16" fill="#2E86DE"/><rect x="-18" y="-166" width="36" height="26" rx="8" fill="#4DA3FF"/><path d="M-16 150 l16 40 l16 -40z" fill="#334155"/></g>
    <g transform="rotate(8)"><rect x="-16" y="-150" width="32" height="300" rx="16" fill="#22C55E"/><rect x="-18" y="-166" width="36" height="26" rx="8" fill="#4ADE80"/><path d="M-16 150 l16 40 l16 -40z" fill="#334155"/></g>
    <g transform="rotate(24)"><rect x="-16" y="-150" width="32" height="300" rx="16" fill="#FF6B6B"/><rect x="-18" y="-166" width="36" height="26" rx="8" fill="#FF8787"/><path d="M-16 150 l16 40 l16 -40z" fill="#334155"/></g>
    <g transform="rotate(-24) translate(0 -8)"><rect x="-6" y="-150" width="10" height="300" rx="5" fill="#ffffff" opacity="0.25"/></g>
  </g>

  <!-- ===== Stacked gift/kit boxes right ===== -->
  <g transform="translate(850 780) rotate(3)">
    <rect x="-120" y="-30" width="240" height="150" rx="14" fill="#334155"/>
    <rect x="-120" y="-30" width="240" height="150" rx="14" fill="url(#s2sheen)" opacity="0.3"/>
    <rect x="-20" y="-30" width="40" height="150" fill="#2DD4BF"/>
    <rect x="-120" y="40" width="240" height="20" fill="#2DD4BF"/>
    <path d="M-30 -30 q30 -46 60 0 q-30 -20 -60 0z" fill="#2DD4BF"/>
  </g>
  <g transform="translate(880 640) rotate(-4)">
    <rect x="-95" y="-60" width="190" height="120" rx="12" fill="#475569"/>
    <rect x="-16" y="-60" width="32" height="120" fill="#FFC93C"/>
    <rect x="-95" y="-12" width="190" height="16" fill="#FFC93C"/>
  </g>

  <!-- ===== 50% OFF starburst badge top-right ===== -->
  <g transform="translate(920 380)">
    <path d="M0 -140 l30 40 l48 -18 l-2 52 l50 22 l-38 36 l24 46 l-52 -6 l-18 49 l-40 -33 l-40 33 l-18 -49 l-52 6 l24 -46 l-38 -36 l50 -22 l-2 -52 l48 18 z" fill="#EF4444"/>
    <path d="M0 -118 l25 34 l40 -15 l-1 44 l42 18 l-32 30 l20 39 l-44 -5 l-15 41 l-35 -28 l-35 28 l-15 -41 l-44 5 l20 -39 l-32 -30 l42 -18 l-1 -44 l40 15 z" fill="#DC2626"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff">50%</text>
    <text x="0" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="6">OFF</text>
  </g>
</svg>
