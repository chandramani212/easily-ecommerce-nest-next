<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none" role="img" aria-label="Custom branded promotional products">
  <defs>
    <linearGradient id="s1sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow uniting the group -->
  <ellipse cx="600" cy="960" rx="430" ry="70" fill="#0f172a" opacity="0.20"/>

  <!-- ===== Tote / drawstring bag (kraft) center-back ===== -->
  <g transform="translate(600 560)">
    <ellipse cx="0" cy="235" rx="205" ry="40" fill="#0f172a" opacity="0.18"/>
    <path d="M-175 -60 q175 -70 350 0 l25 210 q-200 90 -400 0 z" fill="#E7B268"/>
    <path d="M-175 -60 q175 -70 350 0 l8 68 q-183 70 -366 0 z" fill="#D69C4C"/>
    <!-- drawstring holes/cord -->
    <path d="M-150 -34 q150 -58 300 0" stroke="#B67C34" stroke-width="10" fill="none"/>
    <path d="M-120 -40 q120 -46 240 0" stroke="#ffffff" stroke-width="8" fill="none" opacity="0.8"/>
    <!-- brand badge -->
    <circle cx="0" cy="120" r="66" fill="#ffffff" opacity="0.95"/>
    <path d="M0 82 l16 40 l-40 -25 h48 l-40 25 z" fill="#14B8A6"/>
  </g>

  <!-- ===== Ceramic mug (coral) front-left ===== -->
  <g transform="translate(360 700) rotate(-6)">
    <ellipse cx="0" cy="132" rx="92" ry="18" fill="#0f172a" opacity="0.20"/>
    <path d="M-80 -78 h160 v80 a80 84 0 0 1 -160 0 z" fill="#FF6B6B"/>
    <ellipse cx="0" cy="-78" rx="80" ry="22" fill="#FF8787"/>
    <ellipse cx="0" cy="-78" rx="60" ry="15" fill="#7B3B24" opacity="0.55"/>
    <path d="M80 -52 a58 58 0 0 1 2 104" fill="none" stroke="#FF6B6B" stroke-width="24" stroke-linecap="round"/>
    <rect x="-48" y="-36" width="96" height="70" rx="12" fill="#ffffff" opacity="0.95"/>
    <path d="M0 -18 l14 34 l-34 -22 h42 l-34 22 z" fill="#FF6B6B"/>
    <path d="M-80 -78 h30 v150 a80 84 0 0 1 -30 -14 z" fill="url(#s1sheen)"/>
  </g>

  <!-- ===== Travel tumbler (teal) right ===== -->
  <g transform="translate(830 620) rotate(7)">
    <ellipse cx="0" cy="205" rx="80" ry="18" fill="#0f172a" opacity="0.20"/>
    <path d="M-66 -190 h132 l-10 380 a56 24 0 0 1 -112 0 z" fill="#14B8A6"/>
    <path d="M-66 -190 h34 l-8 402 a56 24 0 0 1 -18 -8 z" fill="url(#s1sheen)"/>
    <rect x="-72" y="-215" width="144" height="34" rx="16" fill="#0F172A"/>
    <ellipse cx="0" cy="-215" rx="72" ry="16" fill="#334155"/>
    <rect x="-58" y="-70" width="116" height="150" rx="10" fill="#ffffff" opacity="0.94"/>
    <path d="M0 -30 l16 40 l-40 -26 h48 l-40 26 z" fill="#14B8A6"/>
  </g>

  <!-- ===== Notebook + pen front-center ===== -->
  <g transform="translate(560 880) rotate(-3)">
    <rect x="-150" y="-14" width="300" height="150" rx="16" fill="#0f172a" opacity="0.18"/>
    <rect x="-150" y="-26" width="300" height="150" rx="16" fill="#FFC93C"/>
    <rect x="-150" y="-26" width="34" height="150" rx="16" fill="#F6A609"/>
    <line x1="-133" y1="-26" x2="-133" y2="124" stroke="#ffffff" stroke-width="5" stroke-dasharray="12 10" opacity="0.8"/>
    <rect x="-80" y="14" width="150" height="18" rx="9" fill="#ffffff" opacity="0.85"/>
    <rect x="-80" y="52" width="110" height="14" rx="7" fill="#ffffff" opacity="0.6"/>
    <!-- pen -->
    <g transform="translate(120 40) rotate(38)">
      <rect x="-14" y="-120" width="28" height="220" rx="14" fill="#7C3AED"/>
      <rect x="-14" y="-120" width="10" height="220" rx="5" fill="#ffffff" opacity="0.25"/>
      <path d="M-14 100 l14 44 l14 -44 z" fill="#334155"/>
      <rect x="-16" y="-134" width="32" height="26" rx="8" fill="#A78BFA"/>
    </g>
  </g>

  <!-- ===== Cap (blue) far right ===== -->
  <g transform="translate(980 830) rotate(4)">
    <ellipse cx="0" cy="70" rx="120" ry="26" fill="#0f172a" opacity="0.18"/>
    <path d="M-96 30 a96 96 0 0 1 192 0 z" fill="#2E86DE"/>
    <path d="M-96 30 a96 96 0 0 1 96 -92 a96 96 0 0 1 0 92 z" fill="#4DA3FF" opacity="0.5"/>
    <path d="M60 30 q90 4 118 44 q-70 20 -142 4 z" fill="#1F6FC4"/>
    <circle cx="0" cy="-66" r="12" fill="#1F6FC4"/>
    <circle cx="-6" cy="6" r="26" fill="#ffffff" opacity="0.95"/>
    <path d="M-6 -12 l10 24 l-24 -15 h28 l-24 15 z" fill="#2E86DE"/>
  </g>

  <!-- ===== Keychain + lanyard top-left ===== -->
  <g transform="translate(280 420) rotate(-14)">
    <path d="M0 -120 l60 0 l-30 300 l-30 0 z" fill="#22C55E"/>
    <path d="M0 -120 l24 0 l-30 300 l-12 0 z" fill="#16A34A"/>
    <circle cx="-2" cy="200" r="34" fill="none" stroke="#94A3B8" stroke-width="12"/>
    <rect x="-40" y="230" width="76" height="50" rx="10" fill="#FF6B6B"/>
    <circle cx="-2" cy="255" r="12" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
